<html lang="pt-BR">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CETI HELVIDIO NUNES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --wa-green: #25d366;
            --bg: #1e293b;
            --card-bg: #0f172a;
            --white: #ffffff;
            --text-gray: #94a3b8;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--white); 
            display: flex; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MENU MOBILE --- */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            padding: 15px;
            z-index: 100;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary);
            padding: 20px;
            position: fixed;
            height: 100vh;
            border-right: 1px solid #334155;
            z-index: 1000;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar h2 { font-size: 1.1rem; margin-bottom: 30px; color: #60a5fa; text-align: center; font-weight: 800; }
        .group-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-gray); margin: 20px 0 10px 5px; font-weight: bold; }
        
        .nav-btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 8px;
            cursor: pointer; transition: 0.3s; font-size: 0.85rem; color: #cbd5e1;
            background: transparent; border: none; text-align: left;
        }
        .nav-btn:hover { background: #334155; }
        .nav-btn.active { background-color: var(--accent); color: white; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { 
            margin-left: var(--sidebar-width); 
            width: 100%; 
            padding: 40px; 
            transition: 0.3s;
        }

        header { margin-bottom: 30px; }
        header h1 { font-size: 1.8rem; margin-bottom: 5px; }

        /* --- FORMULÁRIO --- */
        .form-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            border: 1px solid #334155;
            align-items: end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.7rem; font-weight: bold; color: var(--text-gray); text-transform: uppercase; }
        
        input, select {
            padding: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            outline: none;
            width: 100%;
            font-size: 1rem;
        }

        .btn-save {
            background-color: var(--accent); color: white; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
            font-size: 1rem;
        }

        /* --- TABELA --- */
        .page { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #334155; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 15px; font-size: 0.7rem; color: var(--text-gray); border-bottom: 1px solid #334155; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #334155; font-size: 0.9rem; vertical-align: middle; }

        /* --- BADGES E BOTÕES --- */
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; display: inline-block; }
        .badge-merito { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-adv { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .btn-whats {
            background-color: var(--wa-green); color: white; text-decoration: none;
            padding: 10px 15px; border-radius: 8px; font-size: 0.75rem; font-weight: bold;
            display: inline-flex; align-items: center; gap: 5px;
        }

        .btn-delete { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
        }

        /* --- RESPONSIVIDADE (MOBILE) --- */
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 80px 15px 20px 15px; }
            .overlay.active { display: block; }
            
            header h1 { font-size: 1.4rem; }
            .form-container { grid-template-columns: 1fr; padding: 15px; }
            .btn-save { width: 100%; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function init() {
            renderMenu();
            updateDataDisplay();
            if (!localStorage.getItem(STORAGE_KEY)) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ registros: {} }));
            }
        }

        function updateDataDisplay() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('data-atual-display').innerText = new Date().toLocaleDateString('pt-BR', options);
        }

        function renderMenu() {
            const menu = document.getElementById('menu-turmas');
            menu.innerHTML = "";
            turmasConfig.forEach(grupo => {
                const header = document.createElement('div');
                header.className = 'group-title';
                header.innerText = grupo.categoria;
                menu.appendChild(header);

                grupo.nomes.forEach(nome => {
                    const btn = document.createElement('button');
                    btn.className = 'nav-btn';
                    btn.innerText = nome;
                    btn.onclick = () => {
                        selecionarTurma(nome, btn);
                        if(window.innerWidth < 768) toggleMenu();
                    };
                    menu.appendChild(btn);
                });
            });
        }

        function selecionarTurma(nome, btnElement) {
            turmaAtiva = nome;
            document.getElementById('current-turma-title').innerText = nome;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            const select = document.getElementById('alunoSelect');
            select.innerHTML = '<option value="">Escolha um aluno...</option>';
            
            const alunos = bancoDadosAlunos[nome] || [];
            alunos.forEach(aluno => {
                const opt = document.createElement('option');
                opt.value = aluno.nome;
                opt.innerText = aluno.nome;
                select.appendChild(opt);
            });
            renderizarTabela();
        }

        function salvarRegistro() {
            if(!turmaAtiva) return alert("Selecione uma turma primeiro!");
            
            const inputs = {
                nome: document.getElementById('alunoSelect').value,
                desc: document.getElementById('ocorrenciaDesc').value,
                tipo: document.getElementById('ocorrenciaTipo').value,
                dataR: document.getElementById('dataReuniao').value,
                horaR: document.getElementById('horaReuniao').value
            };
            
            if (!inputs.nome || !inputs.desc) return alert("Preencha o aluno e o motivo!");

            const alunoDados = bancoDadosAlunos[turmaAtiva].find(a => a.nome === inputs.nome);
            let storage = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"registros": {}}');
            
            if (!storage.registros[turmaAtiva]) storage.registros[turmaAtiva] = [];

            storage.registros[turmaAtiva].push({
                id: Date.now(),
                nome: inputs.nome,
                tipo: inputs.tipo,
                desc: inputs.desc, 
                resp: alunoDados ? alunoDados.responsavel : "Não Informado", 
                tel: alunoDados ? alunoDados.tel : "", 
                dataReuniao: inputs.dataR, 
                horaReuniao: inputs.horaR
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(storage));
            resetForm();
            renderizarTabela();
        }

        function resetForm() {
            document.getElementById('ocorrenciaDesc').value = "";
            document.getElementById('dataReuniao').value = "";
            document.getElementById('horaReuniao').value = "";
            document.getElementById('alunoSelect').selectedIndex = 0;
        }

        function renderizarTabela() {
            if(!turmaAtiva) return;
            const storage = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"registros": {}}');
            const registros = storage.registros[turmaAtiva] || [];
            const corpo = document.getElementById('tabelaCorpo');
            const emptyMsg = document.getElementById('emptyMsg');

            corpo.innerHTML = "";
            emptyMsg.style.display = registros.length ? "none" : "block";

            registros.forEach(reg => {
                const tr = document.createElement('tr');
                const cleanTel = reg.tel ? reg.tel.replace(/\D/g,'') : "";
                
                let whatsReuniao = "";
                if(reg.dataReuniao && reg.horaReuniao) {
                    const dataBr = reg.dataReuniao.split('-').reverse().join('/');
                    whatsReuniao = ` Solicitamos sua presença na escola no dia ${dataBr} às ${reg.horaReuniao} para tratarmos do assunto.`;
                }

                const msgWhats = encodeURIComponent(`Olá, ${reg.resp}. Registro de ${reg.tipo} para o aluno(a) ${reg.nome} no CETI Helvidio Nunes. Motivo: ${reg.desc}.${whatsReuniao}`);
                const waLink = cleanTel ? `https://wa.me/${cleanTel}?text=${msgWhats}` : "#";

                tr.innerHTML = `
                    <td><b>${reg.nome}</b></td>
                    <td><span class="badge ${reg.tipo === 'MÉRITO' ? 'badge-merito' : 'badge-adv'}">${reg.tipo}</span><br><small>${reg.desc}</small></td>
                    <td>${reg.resp}</td>
                    <td>
                        ${cleanTel ? `<a href="${waLink}" target="_blank" class="btn-whats">WHATSAPP</a>` : '<small style="color:red">Sem tel</small>'}
                    </td>
                    <td><button class="btn-delete" onclick="deletar(${reg.id})">🗑️</button></td>
                `;
                corpo.appendChild(tr);
            });
        }

        function deletar(id) {
            if(!confirm("Remover este registro?")) return;
            let storage = JSON.parse(localStorage.getItem(STORAGE_KEY));
            storage.registros[turmaAtiva] = storage.registros[turmaAtiva].filter(r => r.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(storage));
            renderizarTabela();
        }
